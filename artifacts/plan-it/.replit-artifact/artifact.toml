kind = "web"
previewPath = "/"
title = "Plan-It"
version = "1.0.0"
id = "artifacts/plan-it"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25426

[services.development]
run = "pnpm --filter @workspace/plan-it run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plan-it", "run", "build" ]
publicDir = "artifacts/plan-it/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25426"
BASE_PATH = "/"
